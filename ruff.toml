# ruff configuration — https://docs.astral.sh/ruff/configuration/
target-version = "py39"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[format]
quote-style = "double"
indent-style = "space"

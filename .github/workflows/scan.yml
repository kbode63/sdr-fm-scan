name: Run Scan

# This workflow requires a self-hosted GitHub Actions runner with an
# RTL-SDR dongle attached and librtlsdr installed.
#
# Runner setup (one-time):
#   1. Register a self-hosted runner:  https://github.com/kbode63/sdr-fm-scan/settings/actions/runners
#   2. Add the label "rtl-sdr" to the runner.
#   3. On the runner host:
#        brew install librtlsdr          # macOS
#        sudo apt install rtl-sdr       # Debian/Ubuntu
#        pip3 install matplotlib numpy pandas

on:
  workflow_dispatch:
    inputs:
      freq_low:
        description: "Lower frequency bound (e.g. 85M)"
        required: false
        default: "85M"
      freq_high:
        description: "Upper frequency bound (e.g. 110M)"
        required: false
        default: "110M"
      step:
        description: "Step size (e.g. 125k)"
        required: false
        default: "125k"
      duration:
        description: "Scan duration in seconds"
        required: false
        default: "60"
      threshold:
        description: "SNR detection threshold in dB"
        required: false
        default: "3.0"

  # Uncomment to run on a schedule (e.g. every 6 hours).
  # Ensure a self-hosted runner with label "rtl-sdr" is always online.
  # schedule:
  #   - cron: "0 */6 * * *"

permissions:
  contents: write   # allow committing scan data and charts

jobs:
  scan:
    name: Capture scan (${{ inputs.freq_low }}–${{ inputs.freq_high }})
    runs-on: [self-hosted, rtl-sdr]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify RTL-SDR device
        run: rtl_test -t 2>&1 | head -10

      - name: Run scan
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          CSV="data/scan_${TIMESTAMP}.csv"
          echo "SCAN_CSV=${CSV}" >> "$GITHUB_ENV"
          echo "SCAN_TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          rtl_power \
            -f "${{ inputs.freq_low }}:${{ inputs.freq_high }}:${{ inputs.step }}" \
            -g 49.6 \
            -i 1 \
            -e "${{ inputs.duration }}" \
            "${CSV}"
          echo "Scan complete: ${CSV}"

      - name: Install Python dependencies
        run: pip3 install matplotlib numpy pandas

      - name: Analyse scan & generate charts
        run: |
          python3 scripts/analyze.py \
            "${{ env.SCAN_CSV }}" \
            --outdir charts/ \
            --threshold "${{ inputs.threshold }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ env.SCAN_TIMESTAMP }}
          path: |
            ${{ env.SCAN_CSV }}
            charts/*.png
            charts/*_summary.json
          retention-days: 90

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Force-add the timestamped CSV (excluded by .gitignore for manual scans)
          git add -f "${{ env.SCAN_CSV }}"
          git add charts/
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "scan: ${{ inputs.freq_low }}–${{ inputs.freq_high }} @ ${{ env.SCAN_TIMESTAMP }} [skip ci]"
          git push

name: Run Scan

# This workflow requires a self-hosted GitHub Actions runner with an
# RTL-SDR dongle attached and librtlsdr installed.
#
# Runner setup (one-time):
#   1. Register a self-hosted runner:  https://github.com/kbode63/sdr-fm-scan/settings/actions/runners
#   2. Add the label "rtl-sdr" to the runner.
#   3. On the runner host:
#        brew install librtlsdr          # macOS
#        sudo apt install rtl-sdr       # Debian/Ubuntu
#        pip3 install matplotlib numpy pandas

on:
  workflow_dispatch:
    inputs:
      band:
        description: "Named band preset (overrides freq_low/freq_high/step when set)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - fm
          - airband
          - weather
          - marine
          - 2m
          - 70cm
          - ism433
      freq_low:
        description: "Lower frequency bound — ignored when band is set (e.g. 85M)"
        required: false
        default: "85M"
      freq_high:
        description: "Upper frequency bound — ignored when band is set (e.g. 110M)"
        required: false
        default: "110M"
      step:
        description: "Step size — overrides band default when set (e.g. 125k)"
        required: false
        default: ""
      duration:
        description: "Scan duration in seconds"
        required: false
        default: "60"
      threshold:
        description: "SNR detection threshold in dB"
        required: false
        default: "3.0"

  # Uncomment to run on a schedule (e.g. every 6 hours).
  # Ensure a self-hosted runner with label "rtl-sdr" is always online.
  # schedule:
  #   - cron: "0 */6 * * *"

permissions:
  contents: write   # allow committing scan data and charts

jobs:
  scan:
    name: "Capture scan (${{ inputs.band != '' && inputs.band || format('{0}\u2013{1}', inputs.freq_low, inputs.freq_high) }})"
    runs-on: [self-hosted, rtl-sdr]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify RTL-SDR device
        run: rtl_test -t 2>&1 | head -10

      - name: Install Python dependencies
        run: pip3 install matplotlib numpy pandas

      - name: Run scan & analyse
        run: |
          ARGS=(--duration "${{ inputs.duration }}" --threshold "${{ inputs.threshold }}")
          if [[ -n "${{ inputs.band }}" ]]; then
            ARGS+=(--band "${{ inputs.band }}")
          else
            ARGS+=(--freq "${{ inputs.freq_low }}:${{ inputs.freq_high }}")
          fi
          [[ -n "${{ inputs.step }}" ]] && ARGS+=(--step "${{ inputs.step }}")
          bash scripts/scan.sh "${ARGS[@]}"
          # Capture the CSV written by scan.sh for artifact upload
          BAND_LABEL="${INPUT_BAND:-custom}"
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          echo "SCAN_LABEL=${BAND_LABEL}_${TIMESTAMP}" >> "$GITHUB_ENV"
        env:
          INPUT_BAND: "${{ inputs.band }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ env.SCAN_LABEL }}
          path: |
            data/scan_*.csv
            charts/*.png
            charts/*_summary.json
          retention-days: 90

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/scan_*.csv
          git add charts/
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "scan: ${{ env.SCAN_LABEL }} [skip ci]"
          git push
